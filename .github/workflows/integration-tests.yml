name: Integration tests

on:
  push:
    branches:
      - master
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master

concurrency:
  group: kind-integration-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLUSTER_NAME: kind
  HELM_RELEASE: operator
  LICENSE_SECRET: hazelcast-license-key
  AWS_REGION: us-east-1

jobs:
  run-tests:
    name: Integration tests
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.CN_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CN_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v3
        with:
          secret-ids: |
            HZ_LICENSE_KEY,CN/HZ_LICENSE_KEY

      - name: Create Kind config
        run: |
          cat > kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
            - role: worker
          EOF

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          config: ./kind-config.yaml
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Install Hazelcast Platform Operator (Helm)
        run: |
          set -euo pipefail
          STABLE_VERSION=$(
            curl -fsSL https://artifacthub.io/api/v1/packages/helm/hazelcast/hazelcast-platform-operator \
              | jq -r '.available_versions | map(select(.version | contains("snapshot") | not)) | .[0].version'
          )
          helm repo add hazelcast https://hazelcast-charts.s3.amazonaws.com
          helm repo update
          helm install "${HELM_RELEASE}" hazelcast/hazelcast-platform-operator \
            --version="${STABLE_VERSION}" \
            --set installCRDs=true \
            --set phoneHomeEnabled=false \
            --wait
          kubectl rollout status "deployment.apps/${HELM_RELEASE}-hazelcast-platform-operator" --timeout=300s
          kubectl wait pods -l app.kubernetes.io/name=hazelcast-platform-operator \
            --for=condition=Ready --timeout=300s

      - name: Create license secret
        run: |
          kubectl create secret generic "${LICENSE_SECRET}" \
            --from-literal=license-key="${{ env.HZ_LICENSE_KEY }}"

      - name: Create Hazelcast Platform Enterprise cluster
        run: |
          kubectl apply -f - <<EOF
          apiVersion: hazelcast.com/v1alpha1
          kind: Hazelcast
          metadata:
            name: my-hazelcast
          spec:
            clusterSize: 3
            repository: docker.io/hazelcast/hazelcast-enterprise
            licenseKeySecretName: ${LICENSE_SECRET}
          EOF

      - name: Assert Hazelcast status
        run: |
          kubectl wait --for=jsonpath='{.status.phase}'=Running \
            --timeout=600s hazelcast/my-hazelcast
          READY=$(
            kubectl get hazelcast my-hazelcast \
              -o jsonpath='{.status.hazelcastClusterStatus.readyMembers}'
          )
          if [ "${READY}" != "3/3" ]; then
            echo "Unexpected ready members: ${READY}"
            kubectl get hazelcast my-hazelcast -o yaml
            kubectl get pods -l app.kubernetes.io/instance=my-hazelcast
            exit 1
          fi

      - name: Create Management Center
        run: |
          kubectl apply -f - <<EOF
          apiVersion: hazelcast.com/v1alpha1
          kind: ManagementCenter
          metadata:
            name: my-managementcenter
          spec:
            repository: docker.io/hazelcast/management-center
            licenseKeySecretName: ${LICENSE_SECRET}
            hazelcastClusters:
              - address: my-hazelcast
                name: dev
          EOF

      - name: Assert Management Center status
        run: |
          kubectl wait --for=jsonpath='{.status.phase}'=Running \
            --timeout=600s managementcenter/my-managementcenter
